name: CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & test with coverage
        run: mvn -B verify

      - name: Coverage summary
        run: |
          JACOCO_XML="target/site/jacoco/jacoco.xml"
          LINE=$(grep -oE '<counter type="LINE" missed="[0-9]+" covered="[0-9]+"' "$JACOCO_XML" | tail -1)
          MISSED=$(echo "$LINE" | grep -oE 'missed="[0-9]+"' | grep -oE '[0-9]+')
          COVERED=$(echo "$LINE" | grep -oE 'covered="[0-9]+"' | grep -oE '[0-9]+')
          TOTAL=$((MISSED + COVERED))
          PERCENT=$(awk "BEGIN {printf \"%.2f\", ($COVERED/$TOTAL)*100}")
          echo "## JaCoCo Code Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Line coverage | **$PERCENT%** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Covered lines | $COVERED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Missed lines | $MISSED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total lines | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: error

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/versioned-kv-store:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/versioned-kv-store:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
