name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & test
        working-directory: versioned-kv-store
        run: mvn -B verify

      - name: Upload built JAR
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: versioned-kv-store-jar
          path: versioned-kv-store/target/*.jar
          if-no-files-found: warn
